name: "Build CI"

env:
  GH_TOKEN: ${{ secrets.GH_TOKEN }}
  CI_DEPLOY_USERNAME: ${{ secrets.CI_DEPLOY_USERNAME }}
  CI_DEPLOY_PASSWORD: ${{ secrets.CI_DEPLOY_PASSWORD }}
  SONAR_ENABLED: ${{ vars.SONAR_ENABLED || 'false' }}
  SONAR_PROVIDER: ${{ vars.SONAR_PROVIDER || 'sonarqube' }}
  SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL || '' }}
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY || '' }}
  SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION || '' }}

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && format('ci-default-branch-{0}-{1}', github.sha, github.workflow) ||
    format('ci-pr-{0}-{1}', github.ref, github.workflow) }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  actions: read
  pull-requests: write
  attestations: write
  id-token: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Java setup
        uses: ./.github/actions/java-setup

      - name: Configure git
        uses: ./.github/actions/configure-git

      - name: Download deps and plugins
        run: mvn de.qaware.maven:go-offline-maven-plugin:resolve-dependencies -s ./settings.xml

      - name: Collect Workflow Telemetry
        uses: catchpoint/workflow-telemetry-action@v2
        with:
          theme: dark

      - name: Build
        uses: ./.github/actions/build-deploy
        with:
          branch: ${{ github.ref_name }}

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Java setup
        uses: ./.github/actions/java-setup

      - name: Unit Tests
        uses: ./.github/actions/unit-test

      - name: Sonar Scan (Report Only)
        if: ${{ env.SONAR_ENABLED == 'true' && (github.event_name == 'pull_request' || github.ref == 'refs/heads/main') && secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${SONAR_PROJECT_KEY}" ]]; then
            echo "SONAR_PROJECT_KEY is required when SONAR_ENABLED=true"
            exit 1
          fi

          if [[ "${SONAR_PROVIDER}" == "sonarcloud" ]]; then
            if [[ -z "${SONAR_ORGANIZATION}" ]]; then
              echo "SONAR_ORGANIZATION is required when SONAR_PROVIDER=sonarcloud"
              exit 1
            fi
            SONAR_HOST_ARG="-Dsonar.host.url=https://sonarcloud.io"
            SONAR_PROVIDER_ARG="-Dsonar.organization=${SONAR_ORGANIZATION}"
          else
            if [[ -z "${SONAR_HOST_URL}" ]]; then
              echo "SONAR_HOST_URL is required when SONAR_PROVIDER=sonarqube"
              exit 1
            fi
            SONAR_HOST_ARG="-Dsonar.host.url=${SONAR_HOST_URL}"
            SONAR_PROVIDER_ARG=""
          fi

          mvn -B -e -Psonar-analysis sonar:sonar \
            -Dsonar.projectKey="${SONAR_PROJECT_KEY}" \
            -Dsonar.token="${SONAR_TOKEN}" \
            -Dsonar.qualitygate.wait=false \
            ${SONAR_HOST_ARG} ${SONAR_PROVIDER_ARG}

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Java setup
        uses: ./.github/actions/java-setup

      - name: Integration Tests
        uses: ./.github/actions/integration-test
